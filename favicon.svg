<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Онлайн-доска">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2b32"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
  </defs>

  <!-- доска (тёмная плитка) -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#tile)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- лёгкая сетка доски -->
  <g fill="#ffffff" fill-opacity="0.07">
    <circle cx="20" cy="20" r="1.1"/><circle cx="32" cy="20" r="1.1"/><circle cx="44" cy="20" r="1.1"/>
    <circle cx="20" cy="32" r="1.1"/><circle cx="32" cy="32" r="1.1"/><circle cx="44" cy="32" r="1.1"/>
    <circle cx="20" cy="44" r="1.1"/><circle cx="32" cy="44" r="1.1"/><circle cx="44" cy="44" r="1.1"/>
  </g>

  <!-- два цветных штриха = совместное рисование -->
  <path d="M14 30 C 21 22, 27 38, 33 30 S 45 22, 50 29" fill="none" stroke="#fde047" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14 40 C 21 32, 27 48, 33 40 S 45 32, 50 39" fill="none" stroke="#10b981" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
